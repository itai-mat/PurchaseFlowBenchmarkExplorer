<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FloraQueen Benchmark Explorer</title>
<style>
  :root {
    --fq-pink: #e6007e;
    --fq-dark: #2b2b2b;
    --bg: #f7f5f3;
    --card-bg: #ffffff;
    --border: #e3ddd8;
    --good: #2e7d32;
    --bad: #c62828;
    --neutral: #8a8a8a;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--fq-dark);
    line-height: 1.5;
  }
  header {
    background: var(--fq-dark);
    color: #fff;
    padding: 20px 28px;
  }
  header h1 { margin: 0 0 4px; font-size: 22px; }
  header p { margin: 0; color: #cfcfcf; font-size: 13px; }

  .tabs {
    display: flex;
    gap: 8px;
    padding: 16px 28px 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    border: none;
    background: transparent;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    color: var(--neutral);
  }
  .tab-btn.active {
    color: var(--fq-pink);
    border-bottom-color: var(--fq-pink);
  }
  .tab-btn .icon { margin-right: 6px; font-size: 15px; }

  .container { padding: 20px 28px 60px; max-width: 1400px; margin: 0 auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Summary table */
  .summary-wrap { overflow-x: auto; margin-bottom: 28px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; }
  table.summary { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.summary th, table.summary td { padding: 8px 8px; text-align: left; border-bottom: 1px solid var(--border); }
  table.summary td { white-space: normal; vertical-align: middle; line-height: 1.3; }
  table.summary th {
    cursor: pointer; user-select: none; background: #faf8f6; font-weight: 600;
    position: sticky; top: 0; white-space: nowrap; font-size: 11px;
    text-transform: uppercase; letter-spacing: .02em; color: #555;
  }
  table.summary th:hover { color: var(--fq-pink); }
  table.summary tbody tr:not(.detail-row):hover { background: #fff5fa; cursor: pointer; }
  table.summary tbody tr.fq-row { background: #fff0f7; font-weight: 600; }
  table.summary tbody tr:not(.detail-row) td { height: 64px; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; white-space: normal; max-width: 70px; text-align: center; line-height: 1.25; }
  .pill.good { background: #e8f5e9; color: var(--good); }
  .pill.bad { background: #fdecea; color: var(--bad); }
  .pill.neutral { background: #eee; color: #666; }
  .logo { width: 32px; height: 32px; object-fit: contain; border-radius: 6px; border: 1px solid var(--border); display: block; background: #fff; padding: 3px; }
  .run-cell { font-size: 11px; color: var(--neutral); text-align: right; white-space: normal; min-width: 150px; }
  .agent-tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; background: #eef2ff; color: #4338ca; margin-right: 5px; }
  .site-cell { font-weight: 700; font-size: 13px; }

  /* Info icon + tooltip */
  .cell-wrap { display: flex; align-items: center; gap: 5px; }
  .info-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 14px; height: 14px; border-radius: 50%;
    background: #eee; color: var(--neutral);
    font-size: 10px; font-style: italic; font-weight: 700;
    cursor: help; flex-shrink: 0;
  }
  .info-icon:hover { background: var(--fq-pink); color: #fff; }
  #tooltip {
    position: fixed; z-index: 1000; max-width: 320px;
    background: var(--fq-dark); color: #fff; font-size: 12px; line-height: 1.4;
    padding: 8px 10px; border-radius: 8px; box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    pointer-events: none; display: none;
  }

  /* Expandable detail row */
  table.summary tbody tr.detail-row { display: none; }
  table.summary tbody tr.detail-row.open { display: table-row; }
  table.summary tbody tr.detail-row td {
    background: #faf8f6;
    cursor: default;
    white-space: normal;
  }
  .expand-icon { display: inline-block; width: 14px; color: var(--fq-pink); font-weight: 700; }

  .detail-content { display: flex; gap: 20px; padding: 14px 6px; align-items: flex-start; flex-wrap: wrap; }
  .detail-gifs { display: flex; gap: 10px; flex-wrap: wrap; flex: 0 0 auto; }
  .detail-gifs img { max-width: 280px; max-height: 320px; border-radius: 6px; border: 1px solid var(--border); background: #f0eeec; cursor: zoom-in; }
  .detail-gifs video { max-width: 280px; max-height: 320px; border-radius: 6px; border: 1px solid var(--border); background: #f0eeec; }
  .human-tag { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; background: #ecfdf5; color: #047857; margin-right: 5px; }
  .detail-gifs .empty { color: var(--neutral); font-size: 13px; font-style: italic; padding: 40px 20px; background: #f0eeec; border-radius: 6px; }

  /* Fullscreen GIF lightbox */
  #lightbox {
    position: fixed; inset: 0; background: rgba(20,20,20,0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 2000; cursor: zoom-out;
  }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 92vw; max-height: 92vh; border-radius: 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .detail-info { flex: 1 1 380px; min-width: 320px; }
  .detail-info dl { margin: 0; display: grid; grid-template-columns: 130px 1fr; gap: 6px 10px; font-size: 13px; }
  .detail-info dt { color: var(--neutral); font-size: 12px; }
  .detail-info dd { margin: 0; }
  .detail-info .synthesis { margin-top: 10px; padding: 10px; background: #fff; border: 1px solid var(--border); border-radius: 8px; font-size: 12.5px; color: #444; }

  footer { text-align: center; padding: 24px; color: var(--neutral); font-size: 12px; }
</style>
</head>

function inflationPill(label, cls) {
  return `<span class="pill ${cls}">${label}</span>`;
}

const COLS = 12; // number of columns in the summary row, for colspan on detail row

function esc(str) {
  return String(str).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function withInfo(valueHtml, tip) {
  if (!tip) return valueHtml;
  return `<div class="cell-wrap">${valueHtml}<span class="info-icon" data-tip="${esc(tip)}">i</span></div>`;
}

function occasionPill(text) {
  if (/^Accurate/i.test(text)) return `<span class="pill good">Accurate</span>`;
  if (/^Mismatch/i.test(text)) return `<span class="pill bad">Mismatch</span>`;
  return `<span class="pill neutral">Not assessed</span>`;
}

function accountPill(text) {
  const short = text.split(" — ")[0].trim();
  if (/^Yes/i.test(short)) return `<span class="pill bad">${short}</span>`;
  if (/^No/i.test(short)) return `<span class="pill good">${short}</span>`;
  return `<span class="pill neutral">${short}</span>`;
}

function buildSummary(data, tableId) {
  const table = document.getElementById(tableId);
  const thead = table.querySelector("thead");
  const tbody = table.querySelector("tbody");
  thead.innerHTML = `<tr>
    <th></th>
    <th></th>
    <th data-key="site">Site</th>
    <th data-key="steps">Steps</th>
    <th data-key="loyalty">Loyalty offer</th>
    <th data-key="price">Product price</th>
    <th data-key="deliveryCost">Delivery cost</th>
    <th data-key="total">Total at boundary</th>
    <th data-key="inflation">Inflation</th>
    <th data-key="occasion">Occasion tag</th>
    <th data-key="account">Account?</th>
    <th data-key="run">Run</th>
  </tr>`;

  function render(rows) {
    tbody.innerHTML = rows.map((d, i) => `
      <tr data-idx="${i}" class="${d.isFQ ? 'fq-row' : ''}">
        <td><span class="expand-icon">▶</span></td>
        <td><img class="logo" src="https://www.google.com/s2/favicons?domain=${d.domain}&sz=64" alt="${d.site} logo" loading="lazy"></td>
        <td class="site-cell">${d.site}</td>
        <td>${withInfo(d.steps, d.fields)}</td>
        <td>${withInfo(d.loyalty.split(" — ")[0].split(",")[0], d.loyalty)}</td>
        <td>${withInfo(d.price, d.upsell)}</td>
        <td>${withInfo(d.deliveryCost, d.delivery)}</td>
        <td>${withInfo(d.total, d.delivery)}</td>
        <td>${withInfo(inflationPill(d.inflation, d.inflationClass), d.upsell)}</td>
        <td>${withInfo(occasionPill(d.occasion), d.occasion)}</td>
        <td>${withInfo(accountPill(d.account), d.account)}</td>
        <td class="run-cell">${d.runType === "Human" ? '<span class="human-tag">Human</span>' : '<span class="agent-tag">Agent</span>'}${d.run}</td>
      </tr>
      <tr class="detail-row" data-idx="${i}">
        <td colspan="${COLS}">
          <div class="detail-content">
            <div class="detail-gifs">
              ${d.gifs.length || d.video
                ? d.gifs.map(g => `<img src="${GIF_DIR}${g}" alt="${d.site} ${d.run}" loading="lazy">`).join("")
                  + (d.video ? `<video src="${VIDEO_DIR}${d.video}" controls preload="metadata"></video>` : "")
                : `<div class="empty">No capture available</div>`}
            </div>
            <div class="detail-info">
              <dl>
                <dt>Occasion accuracy</dt><dd>${d.occasion}</dd>
                <dt>Upsell pattern</dt><dd>${d.upsell}</dd>
                <dt>Loyalty offer</dt><dd>${d.loyalty}</dd>
                <dt>Delivery transparency</dt><dd>${d.delivery}</dd>
                <dt>Recipient form</dt><dd>${d.fields}</dd>
                <dt>Steps</dt><dd>${d.steps}</dd>
                <dt>Account required?</dt><dd>${d.account}</dd>
              </dl>
              <div class="synthesis">${d.synthesis}</div>
            </div>
          </div>
        </td>
      </tr>
    `).join("");
  }
  render(data);

  // sorting
  let sortKey = null, sortAsc = true;
  thead.querySelectorAll("th[data-key]").forEach(th => {
    th.addEventListener("click", () => {
      const key = th.dataset.key;
      sortAsc = (sortKey === key) ? !sortAsc : true;
      sortKey = key;
      const sorted = [...data].sort((a, b) => {
        let av = (a[key] || "").toString().replace(/[^0-9.\-]/g, "");
        let bv = (b[key] || "").toString().replace(/[^0-9.\-]/g, "");
        const an = parseFloat(av), bn = parseFloat(bv);
        let cmp;
        if (!isNaN(an) && !isNaN(bn) && av !== "" && bv !== "") {
          cmp = an - bn;
        } else {
          cmp = (a[key] || "").toString().localeCompare((b[key] || "").toString());
        }
        return sortAsc ? cmp : -cmp;
      });
      render(sorted);
    });
  });

  // click row -> toggle its detail row
  tbody.addEventListener("click", (e) => {
    const tr = e.target.closest("tr");
    if (!tr || tr.classList.contains("detail-row")) return;
    const idx = tr.dataset.idx;
    const detail = tbody.querySelector(`tr.detail-row[data-idx="${idx}"]`);
    const icon = tr.querySelector(".expand-icon");
    if (detail) {
      const open = detail.classList.toggle("open");
      icon.textContent = open ? "▼" : "▶";
    }
  });
}

buildSummary(DESKTOP, "table-desktop");
buildSummary(MOBILE, "table-mobile");

// Tooltip handling (event delegation, works for dynamically-built tables)
const tooltip = document.getElementById("tooltip");
document.addEventListener("mouseover", (e) => {
  const icon = e.target.closest(".info-icon");
  if (!icon) return;
  tooltip.textContent = icon.dataset.tip;
  tooltip.style.display = "block";
  positionTooltip(e, icon);
});
document.addEventListener("mousemove", (e) => {
  if (tooltip.style.display === "block" && e.target.closest(".info-icon")) {
    positionTooltip(e, e.target.closest(".info-icon"));
  }
});
document.addEventListener("mouseout", (e) => {
  if (e.target.closest(".info-icon")) tooltip.style.display = "none";
});
function positionTooltip(e, icon) {
  const pad = 12;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  const rect = tooltip.getBoundingClientRect();
  if (x + rect.width > window.innerWidth) x = e.clientX - rect.width - pad;
  if (y + rect.height > window.innerHeight) y = e.clientY - rect.height - pad;
  tooltip.style.left = x + "px";
  tooltip.style.top = y + "px";
}

// Lightbox for full-screen GIF viewing
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");
document.addEventListener("click", (e) => {
  const img = e.target.closest(".detail-gifs img");
  if (img) {
    lightboxImg.src = img.src;
    lightboxImg.alt = img.alt;
    lightbox.classList.add("open");
    return;
  }
  if (e.target.closest("#lightbox")) {
    lightbox.classList.remove("open");
    lightboxImg.src = "";
  }
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") { lightbox.classList.remove("open"); lightboxImg.src = ""; }
});

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(`panel-${btn.dataset.tab}`).classList.add("active");
  });
});
</script>
